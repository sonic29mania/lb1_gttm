<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Магазин сумок</title>

    <!-- Подключение CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🔹 HEADER -->
<header class="header" id="header-placeholder"></header>

<!-- 🔹 MAIN -->
<main>

<section class="video-slider">
    <video class="slide active" autoplay muted loop>
        <source src="video/video1.mp4" type="video/mp4">
    </video>

    <video class="slide" autoplay muted loop>
        <source src="video/video2.mp4" type="video/mp4">
    </video>

    <video class="slide" autoplay muted loop>
        <source src="video/video3.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <h2>Стильні сумки 2026</h2>
        <p>Обери свій ідеальний стиль</p>
    </div>
</section>

<section class="products">
    <div class="container">
        <h2 class="section-title">Популярні сумки</h2>

        <div class="product-grid">

            <article class="product">
                <img src="img/photo_1.png" alt="Classic Bag">
                <div class="product-info">
                    <h3>Classic Bag</h3>
                    <p>1200 грн</p>
                    <button>Купити</button>
                </div>
            </article>

            <article class="product">
                <img src="img/photo_2.jpg" alt="Elegant Style">
                <div class="product-info">
                    <h3>Elegant Style</h3>
                    <p>1500 грн</p>
                    <button>Купити</button>
                </div>
            </article>

            <article class="product">
                <img src="img/photo_3.jpg" alt="Mini Bag">
                <div class="product-info">
                    <h3>Mini Bag</h3>
                    <p>900 грн</p>
                    <button>Купити</button>
                </div>
            </article>

            <article class="product">
                <img src="img/photo_4.jpg" alt="Travel Bag">
                <div class="product-info">
                    <h3>Travel Bag</h3>
                    <p>2000 грн</p>
                    <button>Купити</button>
                </div>
            </article>

            <article class="product">
                <img src="img/photo_5.jpg" alt="Urban Bag">
                <div class="product-info">
                    <h3>Urban Bag</h3>
                    <p>1300 грн</p>
                    <button>Купити</button>
                </div>
            </article>

            <article class="product">
                <img src="img/photo_6.jpg" alt="Luxury Bag">
                <div class="product-info">
                    <h3>Luxury Bag</h3>
                    <p>2500 грн</p>
                    <button>Купити</button>
                </div>
            </article>

        </div>
    </div>
</section>

</main>

<!-- 🔹 FOOTER -->
<footer class="footer" id="footer-placeholder"></footer>

<!-- Подключение JS -->
<script src="script.js"></script>

</body>
</html>
